# Configuration for FlowCEM mRNA optimization

# Models
ribonn_checkpoint: null          # path to RiboNN .ckpt (null = use mock for testing)
predictor_checkpoint: null       # path to predictor .pt (null = train synthetic)
use_mock: true                   # use MockRiboNN for testing

# Objective
objective: predictor             # 'predictor' or 'ribonn'
target_cell: 0                   # cell type to maximize TE for
off_target_cells: [1, 2, 3, 4]  # cell types to minimize TE for
lam: 1.0                        # off-target penalty weight

# Optimizer
optimizer: flow                  # 'flow' or 'vanilla'
pop_size: 512                    # candidates per CEM iteration
elite_frac: 0.05                # fraction of top samples to keep
n_iters: 200                    # number of CEM iterations
schedule: cosine                 # time schedule: linear, cosine, quadratic, sqrt
momentum: 0.0                   # EMA smoothing for elite updates

# Inversion
seq_len: 2048                   # length of generated sequence
inversion_steps: 500            # gradient descent steps for z* -> sequence
inversion_lr: 0.05              # learning rate for inversion

# Seed (optional)
seed_sequence: null             # initialize CEM from this sequence's embedding

# Output
output_dir: results
device: cpu
